name: Private Poster

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests urllib3

      - name: Cache Xray binary
        id: cache-xray
        uses: actions/cache@v3
        with:
          path: ./bin
          key: xray-linux-64-v1.8.10

      - name: Download Xray (if not cached)
        if: steps.cache-xray.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./bin
          curl -L https://github.com/XTLS/Xray-core/releases/download/v1.8.10/Xray-linux-64.zip -o ./bin/xray.zip
          unzip -o ./bin/xray.zip -d ./bin/
          chmod +x ./bin/xray
        shell: bash

      - name: Set XRAY_PATH
        run: echo "XRAY_PATH=$(pwd)/bin/xray" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Run private poster
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_CHANNEL: ${{ secrets.TELEGRAM_PRIVATE_CHANNEL }}
          GH_TOKEN: ${{ secrets.VPNPRIVATEPOSTER }}
          TELEGRAM_DRY_RUN: "0"
          XRAY_BIN: ${{ env.XRAY_PATH }}
        run: python poster_private.py
